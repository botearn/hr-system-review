# Local development only. Production runs on Supabase + Render + Vercel.
# Postgres image ships with pgvector so you can run the full backend locally
# without depending on Supabase during development.
version: "3.9"

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: hr_postgres_cloud
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-hr}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-hr_pass}
      POSTGRES_DB: ${POSTGRES_DB:-hr_system}
    volumes:
      - pg_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-hr}"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: hr_redis_cloud
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  pg_data:
  redis_data:
